spring.datasource.url=jdbc:h2:mem:matchlog;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true

# Highlightly API-Key lokal setzen (oder leer lassen – Formular funktioniert dann ohne Auto-Fill)
highlightly.api.key=${HIGHLIGHTLY_API_KEY:}
